schema_version: "1.0"

extension:
  id: "golden-demo"
  name: "Golden Demo"
  version: "0.4.3"
  description: "Golden Demo — Deterministic Behavioral Drift Oracle. v0.4.3 fixes regex extraction false positives by requiring structured Given/Input + Returns/Output patterns with concrete literal values."
  author: "jasstt"
  repository: "https://github.com/jasstt/spec-kit-golden-demo"
  license: "MIT"
  changelog:
    v0.2.0:
      - Golden example generation from acceptance criteria
      - Behavioral execution against test vectors
      - Deterministic drift score (output equality)
      - Drift report in .specify/golden-demo/
      - Skips side-effecting and ambiguous specs
    v0.3.0:
      - Cross-language execution support
      - Fuzzing integration
      - Auto-Golden LLM generation
      - CI/CD strict gatekeeping
    v0.4.0:
      - Hybrid LLM+regex spec parsing (natural language support, regex fallback)
      - Fixture/resource sandbox for side-effecting vectors:
          filesystem: tempdir seeded from fixtures/vector_N/fs/
          http: local HTTPServer with route fixtures, BASE_URL injected
          db: disposable SQLite with schema/seed, DATABASE_URL injected
      - Semantic comparison: numeric tolerance, type coercion, partial list scoring
      - is_pure tracking per vector
      - Unsupported side-effect types reported as [UNSUPPORTED], not silently skipped
    v0.4.1:
      - compare_files: checks only expected files, ignores extra files in actual dir
      - extract-vectors: removed mock references, replaced with fixture scaffold generation
      - README and extension.yml: corrected mock claims to fixture sandbox description
    v0.4.2:
      - HTTP proxy injection for plain http:// calls via subprocess-scoped HTTP_PROXY / HTTPS_PROXY
      - HTTPS CONNECT attempts are documented as out of scope unless future MITM support is added
      - GATED snapshot mode: "off" | "gated"; no automatic snapshot mode
      - Empty pure golden files can be initialized only after human approval or explicit operator approval flag
    v0.4.3:
      - "Fixed: extraction regex was matching loose keywords (e.g. 'of', 'their') as false-positive input/output candidates. Now requires structured Given/Input + Returns/Output pattern with concrete literal values."

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: "speckit.golden-demo.extract-vectors"
      file: "commands/extract-vectors.md"
      description: "Reads spec.md and plan.md, identifies acceptance criteria, writes .specify/golden-demo/test-vectors.md"

    - name: "speckit.golden-demo.check-drift"
      file: "commands/check-drift.md"
      description: "Runs real code against golden examples to detect behavioral drift. Exits 1 if drift detected in strict mode."

    - name: "speckit.golden-demo.auto-golden"
      file: "commands/auto-golden.md"
      description: "Automatically writes pure function golden templates using LLM. Requires human approval."

hooks:
  after_plan:
    command: "speckit.golden-demo.extract-vectors"
    optional: true
    prompt: "Golden Demo: extract test vectors from spec and plan?"
    description: "Pulls acceptance-criteria items into .specify/golden-demo/test-vectors.md after planning"

  after_implement:
    command: "speckit.golden-demo.check-drift"
    optional: true
    prompt: "Golden Demo: run behavioral drift check?"
    description: "Dry-run drift report against the captured test vectors after implementation"

tags:
  - "testing"
  - "drift-detection"
  - "behavioral-oracle"
  - "tdd"
  - "quality"
